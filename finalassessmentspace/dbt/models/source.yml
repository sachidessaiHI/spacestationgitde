version: 2

sources:
  - name: spacestation
    database: dev_silver
    description: "Silver layer containing historical, deduplicated ISS telemetry snapshots."
    tables:
      - name: silver_spacestation
        columns:
          - name: measure_timestamp
            tests:
              - unique
              - not_null
          - name: iss_id
            tests:
              - not_null
          - name: latitude
            tests:
              - not_null
          - name: longitude
            tests:
              - not_null
          - name: altitude_km
            tests:
              - not_null
          - name: velocity_kmh
            tests:
              - not_null
          - name: visibility
            tests:
              - not_null